plugins {
    id 'application'
    // Actualizamos a la 0.1.0 para evitar el error del OsDetector
    id 'org.openjfx.javafxplugin' version '0.1.0' 
}

repositories {
    mavenCentral()
}

java {
    toolchain {
        // Esto asegura que Gradle use exactamente tu Java 17 instalado
        languageVersion = JavaLanguageVersion.of(25)
    }
}

javafx {
    version = "25.0.2" 
    modules = [ 'javafx.controls', 'javafx.fxml' ]
}

sourceSets {
    main {
        resources {
            srcDirs = ['src/main/resources']
        }
    }
}

application {
    mainClass = 'com.panwcorp.MainApp' // Asegúrate de que coincida con tu paquete/clase
}